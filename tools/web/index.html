<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小说陪读 · 数据工作台</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">小说陪读 · 数据工作台</div>
      <div class="pack" id="pack-status">未连接数据包</div>
      <a class="ghost navlink" href="/cleaning/">清洗</a>
      <a class="ghost navlink" href="/reader/">阅读器</a>
      <button class="ghost" id="btn-settings">设置</button>
    </header>

    <main class="layout">
      <!-- 左栏：设置 + 章节选择 -->
      <aside class="col col-left">
        <section class="panel" id="settings-panel" hidden>
          <h2>设置</h2>
          <label class="field">
            <span>数据包目录（含 manifest.json）</span>
            <input type="text" id="cfg-bookpack" placeholder="如 ../samples/gray-tower" />
          </label>

          <fieldset>
            <legend>起草模型（主力）</legend>
            <input type="text" id="cfg-drafter-url" placeholder="base_url，如 https://api.deepseek.com" />
            <input type="text" id="cfg-drafter-model" placeholder="model，如 deepseek-v4-flash" />
            <input type="password" id="cfg-drafter-key" placeholder="api_key（留空＝不修改）" />
          </fieldset>

          <fieldset>
            <legend>复核模型（须不同于起草）</legend>
            <input type="text" id="cfg-reviewer-url" placeholder="base_url，如 https://api.deepseek.com" />
            <input type="text" id="cfg-reviewer-model" placeholder="model，如 deepseek-v4-pro" />
            <input type="password" id="cfg-reviewer-key" placeholder="api_key（留空＝不修改）" />
          </fieldset>

          <fieldset>
            <legend>识图模型（清洗·图片，多模态）</legend>
            <input type="text" id="cfg-vision-url" placeholder="base_url，如 https://api.xiaomimimo.com/v1" />
            <input type="text" id="cfg-vision-model" placeholder="model，如 mimo-v2.5" />
            <input type="password" id="cfg-vision-key" placeholder="api_key（留空＝不修改）" />
          </fieldset>

          <p class="hint" id="cfg-采用提示">采用 OpenAI 通用协议（/chat/completions）。配置保存在本地，不进数据包。</p>
          <button class="primary" id="btn-save-config">保存设置</button>
        </section>

        <section class="panel">
          <h2>章节 · 生成范围</h2>
          <p class="hint">起草与复核按整章进行。</p>
          <ul class="chapter-list" id="chapter-list"></ul>
        </section>
      </aside>

      <!-- 中栏：逐 block 正文 -->
      <section class="col col-mid">
        <div class="col-head">
          <span id="mid-title">请选择左侧章节</span>
          <div class="actions">
            <button class="primary" id="btn-draft" disabled>起草</button>
            <button class="primary" id="btn-review" disabled>复核</button>
          </div>
        </div>
        <div class="run-banner" id="run-banner" hidden></div>
        <div class="blocks" id="blocks"></div>
      </section>

      <!-- 右栏：标识 / 异常队列 / 审计 -->
      <aside class="col col-right">
        <div class="tabs">
          <button class="tab active" data-tab="markers">本块标识</button>
          <button class="tab" data-tab="queue">异常队列</button>
          <button class="tab" data-tab="audit">审计 / 回滚</button>
        </div>
        <div class="tab-body" id="tab-markers"></div>
        <div class="tab-body" id="tab-queue" hidden></div>
        <div class="tab-body" id="tab-audit" hidden></div>
      </aside>
    </main>

    <div class="toast" id="toast" hidden></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
