<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小说陪读 · 清洗工作台</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">小说陪读 · 清洗工作台</div>
      <div class="pack" id="pack-status">未连接数据包</div>
      <a class="ghost navlink" href="/">数据工作台</a>
      <a class="ghost navlink" href="/reader/">阅读器</a>
    </header>

    <main class="cleaning-layout">
      <aside class="col col-left">
        <section class="panel">
          <h2>已有清洗项目</h2>
          <div class="row">
            <button id="btn-refresh-projects">刷新列表</button>
          </div>
          <div id="project-list" class="project-list"></div>
          <label class="field">
            <span>给当前项目补挂对照原文 EPUB</span>
            <textarea id="reference-add-path" class="text-input epub-input small" placeholder="每行一个原文 EPUB，顺序与当前项目卷对应"></textarea>
          </label>
          <button class="wide" id="btn-add-reference">挂入当前项目</button>
        </section>

        <section class="panel">
          <h2>新建一本书</h2>
          <label class="field">
            <span>书名 / 系列名（可选）</span>
            <input id="project-name" type="text" placeholder="留空则从 EPUB 文件名识别" />
          </label>
          <label class="field">
            <span>中文 EPUB 路径</span>
            <textarea id="epub-path" class="text-input epub-input" placeholder="同一本书/同一系列，每行一个 EPUB 绝对路径"></textarea>
          </label>
          <label class="field">
            <span>对照原文 EPUB 路径（可选）</span>
            <textarea id="reference-epub-path" class="text-input epub-input small" placeholder="每行一个原文 EPUB，顺序与中文卷对应，如日文 v01/v02/v03"></textarea>
          </label>
          <button class="primary wide" id="btn-auto-clean">开始自动清洗</button>
          <button class="wide" id="btn-reset">清空当前页</button>
        </section>

        <section class="panel">
          <h2>进度</h2>
          <div class="progress-track"><div id="clean-progress" class="progress-fill"></div></div>
          <p class="hint" id="progress-text">等待开始</p>
        </section>
      </aside>

      <section class="col col-mid cleaning-main">
        <div class="col-head">
          <span>清洗任务</span>
          <div class="actions">
            <button id="btn-run-selected" disabled>运行选中</button>
          </div>
        </div>
        <div class="run-banner" id="run-banner" hidden></div>
        <div class="cleaning-scroll">
          <section class="panel flush">
            <h2>章节任务</h2>
            <div id="task-list" class="task-list"></div>
          </section>
          <section class="panel flush">
            <h2>图片标注</h2>
            <label class="field">
              <span>角色名册</span>
              <textarea id="roster" class="text-input" placeholder="可选：人物名=外貌/身份；多人用分号分隔"></textarea>
            </label>
            <div id="asset-list" class="asset-grid"></div>
          </section>
        </div>
      </section>

      <aside class="col col-right cleaning-right">
        <div class="tabs">
          <button class="tab active" data-tab="queue">裁决队列</button>
          <button class="tab" data-tab="suggestions">清洗建议</button>
          <button class="tab" data-tab="raw">原始输出</button>
          <button class="tab" data-tab="usage">用量</button>
        </div>
        <div class="tab-body" id="tab-queue"></div>
        <div class="tab-body" id="tab-suggestions" hidden></div>
        <div class="tab-body" id="tab-raw" hidden></div>
        <div class="tab-body" id="tab-usage" hidden></div>
      </aside>
    </main>

    <div class="toast" id="toast" hidden></div>
    <script type="module" src="cleaning.js"></script>
  </body>
</html>
